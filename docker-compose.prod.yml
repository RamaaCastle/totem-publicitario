version: '3.9'

# ============================================================
# PRODUCCIÓN — pedrazaviajes.dyndns.org
# Backend API:   puerto 5050
# Admin panel:   puerto 8080
# ============================================================
# Uso:
#   cp .env.production .env
#   docker compose -f docker-compose.prod.yml up -d --build

services:
  postgres:
    image: postgres:16-alpine
    container_name: signage_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-signage_db}
      POSTGRES_USER: ${DB_USER:-signage_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-signage_user} -d ${DB_NAME:-signage_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: signage_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./packages/backend
      dockerfile: Dockerfile
    container_name: signage_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
    ports:
      - "5050:3001"
    volumes:
      - uploads_data:/app/uploads

  admin:
    build:
      context: ./packages/admin
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://pedrazaviajes.dyndns.org:5050
    container_name: signage_admin
    restart: unless-stopped
    depends_on:
      - backend
    env_file:
      - .env
    environment:
      NODE_ENV: production
    ports:
      - "8080:3000"

volumes:
  postgres_data:
  redis_data:
  uploads_data:

networks:
  default:
    name: signage_network
