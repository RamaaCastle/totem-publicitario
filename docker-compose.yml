version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: signage_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-signage_db}
      POSTGRES_USER: ${DB_USER:-signage_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-signage_pass}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-signage_user} -d ${DB_NAME:-signage_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: signage_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_pass} --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD:-redis_pass}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./packages/backend
      dockerfile: Dockerfile
    container_name: signage_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER:-signage_user}:${DB_PASSWORD:-signage_pass}@postgres:5432/${DB_NAME:-signage_db}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_pass}@redis:6379
    env_file:
      - .env
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    volumes:
      - uploads_data:/app/uploads

  admin:
    build:
      context: ./packages/admin
      dockerfile: Dockerfile
    container_name: signage_admin
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${API_URL:-http://localhost:3001}
    env_file:
      - .env
    ports:
      - "${ADMIN_PORT:-3000}:3000"

volumes:
  postgres_data:
  redis_data:
  uploads_data:

networks:
  default:
    name: signage_network
