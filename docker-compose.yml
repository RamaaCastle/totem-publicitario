version: '3.9'

services:
  mysql:
    image: mysql:8-debian
    container_name: signage_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME:-signage_db}
      MYSQL_USER: ${DB_USER:-signage_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-signage_pass}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_pass}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-root_pass}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: signage_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_pass} --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD:-redis_pass}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://tv.pedraza.com.ar
        NEXT_PUBLIC_CLOUDINARY_CLOUD: ${NEXT_PUBLIC_CLOUDINARY_CLOUD:-dy4kekwzh}
        NEXT_PUBLIC_CLOUDINARY_PRESET: ${NEXT_PUBLIC_CLOUDINARY_PRESET:-ml_default}
    container_name: signage_app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DB_HOST: mysql
      REDIS_HOST: redis
      DATABASE_URL: mysql://${DB_USER:-signage_user}:${DB_PASSWORD:-signage_pass}@mysql:3306/${DB_NAME:-signage_db}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_pass}@redis:6379
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    volumes:
      - uploads_data:/app/uploads

volumes:
  mysql_data:
  redis_data:
  uploads_data:

networks:
  default:
    name: signage_network
